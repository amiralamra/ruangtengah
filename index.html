<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RuangTengah - Beranda</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (via CDN untuk Prototyping Cepat) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Custom Tailwind untuk nuansa Earth Tone -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        kopi: '#8B5A2B', // Cokelat hangat
                        krem: '#FDFBF7', // Background utama, bukan putih pucat
                        sage: '#87A96B', // Hijau menenangkan untuk tombol positif
                        terakota: '#E2725B', // Merah bata untuk tombol SOS (tidak terlalu agresif)
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Agar terasa seperti aplikasi native */
        body {
            background-color: #FDFBF7;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="text-stone-800 antialiased pb-24">

    <!-- Header / Sapaan -->
    <header class="p-6 pt-10">
        <h1 class="text-2xl font-bold text-kopi">Halo, Nak! 👋</h1>
        <p class="text-stone-500 mt-1">Bagaimana harimu di perantauan hari ini?</p>
    </header>

    <!-- Main Content Area -->
    <main class="px-6 space-y-6">
        
        <!-- Mood Tracker Card -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-100">
            <h2 class="text-sm font-semibold text-stone-600 mb-4">Perasaanku hari ini...</h2>
            <div class="flex justify-between items-center">
                <!-- Emoji Buttons (Bisa diubah jadi form input nantinya) -->
                <button class="text-4xl hover:scale-110 transition-transform active:scale-95">😊</button>
                <button class="text-4xl hover:scale-110 transition-transform active:scale-95">😐</button>
                <button class="text-4xl hover:scale-110 transition-transform active:scale-95">😔</button>
                <button class="text-4xl hover:scale-110 transition-transform active:scale-95">😫</button>
            </div>
        </div>

        <!-- Tombol Ping Harian -->
        <button class="w-full bg-sage text-white font-semibold py-4 rounded-xl shadow-sm active:bg-green-700 transition-colors flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            Semua Baik-Baik Saja
        </button>

    </main>
<footer class="text-center py-8 px-6 text-[11px] font-medium tracking-wide text-stone-400 space-y-2">
        <div class="flex justify-center items-center gap-1.5">
            <i data-lucide="code-2" class="w-3.5 h-3.5 stroke-[2.5]"></i>
            <span>Crafted with care</span>
            <span>•</span>
            <i data-lucide="github" class="w-3.5 h-3.5 stroke-[2.5]"></i>
            <span>Powered by GitHub Pages</span>
        </div>
        <p class="text-[10px] opacity-75">RuangTengah App • Open Source Project</p>
    </footer>
    <!-- Bottom Navigation Bar (App-like feel) -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md border-t border-stone-100 px-8 py-4 flex justify-between items-center z-50 rounded-t-3xl shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
    <!-- Beranda (Aktif) -->
    <a href="#" class="flex flex-col items-center gap-1 text-kopi group">
        <div class="p-1 rounded-xl bg-amber-50 group-active:scale-95 transition-transform">
            <i data-lucide="home" class="w-5 h-5 stroke-[2.5]"></i>
        </div>
        <span class="text-[11px] font-bold tracking-wide">Beranda</span>
    </a>
    
    <!-- Jurnal -->
    <a href="#" class="flex flex-col items-center gap-1 text-stone-400 hover:text-kopi group transition-colors">
        <div class="p-1 rounded-xl group-active:scale-95 transition-transform">
            <i data-lucide="wallet" class="w-5 h-5 stroke-[2]"></i>
        </div>
        <span class="text-[11px] font-medium tracking-wide">Jurnal</span>
    </a>
    
    <!-- Akun -->
    <a href="#" class="flex flex-col items-center gap-1 text-stone-400 hover:text-kopi group transition-colors">
        <div class="p-1 rounded-xl group-active:scale-95 transition-transform">
            <i data-lucide="user" class="w-5 h-5 stroke-[2]"></i>
        </div>
        <span class="text-[11px] font-medium tracking-wide">Akun</span>
    </a>
</nav>
    <!-- Floating SOS Button (Pojok kanan bawah) -->
    <button class="fixed bottom-24 right-6 bg-terakota text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center font-bold text-sm border-4 border-red-200 active:scale-95 transition-transform">
        SOS
    </button>
<script>
        async function kunciPortrait() {
            try {
                // Langkah 1: Masuk ke mode fullscreen terlebih dahulu
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { /* Safari/iOS */
                    await document.documentElement.webkitRequestFullscreen();
                }
                
                // Langkah 2: Kunci orientasi ke portrait
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('portrait');
                    console.log("Layar berhasil dikunci ke portrait.");
                }
            } catch (error) {
                console.log("Gagal mengunci rotasi: ", error.message);
                // Gagal biasanya karena belum ada interaksi pengguna atau perangkat tidak mendukung
            }
        }

        // Memicu penguncian saat pengguna berinteraksi pertama kali (misal memilih mood atau tombol sehat)
        document.addEventListener('click', function pemicuKunci() {
            kunciPortrait();
            // Hapus event listener setelah dijalankan sekali agar tidak mengganggu klik berikutnya
            document.removeEventListener('click', pemicuKunci);
        }, { once: true });
    </script>
    <script>
        // Mengaktifkan semua ikon Lucide di halaman
        lucide.createIcons();
    </script>
</body>
</body>
</html>
